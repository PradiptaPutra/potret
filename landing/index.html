<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Potret — Screenshots with a sense of style</title>
    <meta name="description" content="Potret is a free, open-source macOS screenshot and annotation tool that lives in your menu bar. Snap an area, window, or the whole screen — then copy, annotate, pin, or drop it onto a gorgeous background. No heavy editor. No subscription." />
    <link rel="canonical" href="https://potret-landing.vercel.app/" />
    <meta name="theme-color" content="#0b0a0c" />

    <!-- Open Graph -->
    <meta property="og:title" content="Potret — Screenshots with a sense of style" />
    <meta property="og:description" content="A free, open-source macOS screenshot and annotation tool that lives in your menu bar. Capture, mark up, and ship — no heavy editor, no subscription." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://potret-landing.vercel.app/" />
    <meta property="og:image" content="https://potret-landing.vercel.app/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="Potret — a free, open-source macOS screenshot and annotation tool." />
    <meta property="og:site_name" content="Potret" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Potret — Screenshots with a sense of style" />
    <meta name="twitter:description" content="A free, open-source macOS screenshot and annotation tool that lives in your menu bar. Capture, mark up, and ship — no heavy editor, no subscription." />
    <meta name="twitter:image" content="https://potret-landing.vercel.app/og.jpg" />

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Potret",
        "applicationCategory": "UtilitiesApplication",
        "applicationSubCategory": "DesignApplication",
        "operatingSystem": "macOS",
        "url": "https://potret-landing.vercel.app/",
        "description": "Potret is a free, open-source macOS screenshot and annotation tool that lives in your menu bar. Snap an area, a window, or the whole screen — then copy, annotate, pin, or drop it onto a gorgeous background. No heavy editor. No subscription.",
        "softwareVersion": "0.2.4",
        "license": "https://opensource.org/licenses/MIT",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <!-- Fonts: Fraunces (display serif), Hanken Grotesk (body), JetBrains Mono (labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..700&family=Hanken+Grotesk:wght@300..800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
