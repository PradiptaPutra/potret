<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#2C2C2F"/>
      <stop offset="100%" stop-color="#0C0C0E"/>
    </radialGradient>
    <!-- Bright blade: #FF9F0A app accent at tip, deep amber at root -->
    <linearGradient id="bladeA" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#B36200"/>
      <stop offset="45%" stop-color="#FF9F0A"/>
      <stop offset="100%" stop-color="#FFCB60"/>
    </linearGradient>
    <!-- Dark blade: same hue, lower brightness -->
    <linearGradient id="bladeB" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6B3A00"/>
      <stop offset="45%" stop-color="#CC7500"/>
      <stop offset="100%" stop-color="#E8A030"/>
    </linearGradient>
    <radialGradient id="holeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9F0A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF9F0A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>

  <!-- Back blades (darker, 60/180/300°) — drawn first so front blades overlap -->
  <g transform="translate(512,512)">
    <path d="M 0,-52 C 72,-108 80,-236 0,-310 C -80,-236 -72,-108 0,-52 Z"
          fill="url(#bladeB)" transform="rotate(60)"/>
    <path d="M 0,-52 C 72,-108 80,-236 0,-310 C -80,-236 -72,-108 0,-52 Z"
          fill="url(#bladeB)" transform="rotate(180)"/>
    <path d="M 0,-52 C 72,-108 80,-236 0,-310 C -80,-236 -72,-108 0,-52 Z"
          fill="url(#bladeB)" transform="rotate(300)"/>
  </g>

  <!-- Front blades (bright, 0/120/240°) -->
  <g transform="translate(512,512)">
    <path d="M 0,-52 C 72,-108 80,-236 0,-310 C -80,-236 -72,-108 0,-52 Z"
          fill="url(#bladeA)"/>
    <path d="M 0,-52 C 72,-108 80,-236 0,-310 C -80,-236 -72,-108 0,-52 Z"
          fill="url(#bladeA)" transform="rotate(120)"/>
    <path d="M 0,-52 C 72,-108 80,-236 0,-310 C -80,-236 -72,-108 0,-52 Z"
          fill="url(#bladeA)" transform="rotate(240)"/>
  </g>

  <!-- Ambient glow behind hole -->
  <circle cx="512" cy="512" r="120" fill="url(#holeGlow)"/>

  <!-- Center iris hole — pure black, crisp -->
  <circle cx="512" cy="512" r="68" fill="#050505"/>

  <!-- Orange ring rim on iris opening -->
  <circle cx="512" cy="512" r="68" fill="none"
          stroke="#FF9F0A" stroke-width="4" stroke-opacity="0.5"/>

  <!-- Glass highlight arc (upper-left catch-light) -->
  <path d="M 474,464 A 66,66 0 0,1 528,455"
        stroke="rgba(255,255,255,0.5)" stroke-width="9"
        fill="none" stroke-linecap="round"/>
</svg>
