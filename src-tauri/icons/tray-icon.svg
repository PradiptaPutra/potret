<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44">
  <!-- White aperture on transparent bg — macOS template image -->
  <g transform="translate(22,22)">
    <!-- Back blades (60/180/300°) — slightly dimmer for layered depth -->
    <path d="M 0,-4.5 C 6,-9 7,-18 0,-24 C -7,-18 -6,-9 0,-4.5 Z"
          fill="white" opacity="0.55" transform="rotate(60)"/>
    <path d="M 0,-4.5 C 6,-9 7,-18 0,-24 C -7,-18 -6,-9 0,-4.5 Z"
          fill="white" opacity="0.55" transform="rotate(180)"/>
    <path d="M 0,-4.5 C 6,-9 7,-18 0,-24 C -7,-18 -6,-9 0,-4.5 Z"
          fill="white" opacity="0.55" transform="rotate(300)"/>
    <!-- Front blades (0/120/240°) — full white -->
    <path d="M 0,-4.5 C 6,-9 7,-18 0,-24 C -7,-18 -6,-9 0,-4.5 Z"
          fill="white"/>
    <path d="M 0,-4.5 C 6,-9 7,-18 0,-24 C -7,-18 -6,-9 0,-4.5 Z"
          fill="white" transform="rotate(120)"/>
    <path d="M 0,-4.5 C 6,-9 7,-18 0,-24 C -7,-18 -6,-9 0,-4.5 Z"
          fill="white" transform="rotate(240)"/>
  </g>
</svg>
